<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3-1반 열정 ON!</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <section class="chat-app" aria-label="채팅방 화면">
      <div class="status-bar" aria-hidden="true">
        <span id="statusTime">9:41</span>
        <div class="status-icons">
          <span>LTE</span>
          <span>78%</span>
        </div>
      </div>

      <header class="chat-header">
        <button class="header-icon" id="scrollBottomButton" type="button" aria-label="최신 메시지로 이동">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18 9 12l6-6"></path>
          </svg>
        </button>

        <div class="header-title">
          <strong>3-1반 열정 ON!</strong>
          <span>공유 채팅방</span>
        </div>

        <div class="header-actions">
          <button class="header-icon" id="focusInputButton" type="button" aria-label="입력창으로 이동">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6"></circle>
              <path d="m20 20-4.35-4.35"></path>
            </svg>
          </button>
          <button class="header-icon" id="menuButton" type="button" aria-label="채팅 메뉴 열기" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16"></path>
              <path d="M4 12h16"></path>
              <path d="M4 17h16"></path>
            </svg>
          </button>
        </div>

        <div class="menu-panel hidden" id="menuPanel">
          <button class="menu-item" id="renameButton" type="button">이름 바꾸기</button>
          <button class="menu-item" id="refreshButton" type="button">새로고침</button>
        </div>
      </header>

      <section class="setup-banner hidden" id="setupBanner">
        <strong>Supabase 설정이 필요합니다.</strong>
        <p>`config.js`와 `supabase.sql` 설정을 먼저 완료하세요.</p>
      </section>

      <main class="chat-room" id="chatRoom">
        <div class="room-badge" id="roomBadge"></div>
        <div class="message-list" id="messageList"></div>
        <div class="empty-state hidden" id="emptyState">
          <p id="emptyText">메시지가 아직 없습니다.</p>
          <button class="empty-button" id="emptyRefreshButton" type="button">새로고침</button>
        </div>
      </main>

      <footer class="composer">
        <div class="sender-indicator">
          <span>내 이름</span>
          <strong id="authorStatus">익명</strong>
          <span class="sync-pill" id="syncStatus">연결 준비</span>
        </div>

        <form id="messageForm" class="message-form">
          <button class="mode-button" id="profileButton" type="button" aria-label="이름 바꾸기">
            <span id="profileButtonText">익</span>
          </button>

          <div class="input-shell">
            <textarea
              id="messageInput"
              name="message"
              rows="1"
              maxlength="400"
              placeholder="메시지를 입력하세요"
              required
            ></textarea>
            <button class="inline-icon" id="emojiButton" type="button" aria-label="웃는 이모지 추가">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="8"></circle>
                <path d="M9 10h.01"></path>
                <path d="M15 10h.01"></path>
                <path d="M9 14c.7.8 1.7 1.2 3 1.2s2.3-.4 3-1.2"></path>
              </svg>
            </button>
            <button class="send-button" id="sendButton" type="submit" aria-label="메시지 전송">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 12 20 5 13 19 11 13 4 12Z"></path>
              </svg>
            </button>
          </div>
        </form>
      </footer>
    </section>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
